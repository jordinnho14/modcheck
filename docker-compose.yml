# ModCheck — local dev environment
# Increment 1: Postgres + Redis only. Elasticsearch joins in increment 3.
#
# Usage:
#   docker compose up -d
#   docker compose down        (add -v to wipe data)

services:
  postgres:
    image: postgres:16-alpine
    container_name: modcheck-postgres
    environment:
      POSTGRES_DB: modcheck
      POSTGRES_USER: modcheck
      POSTGRES_PASSWORD: modcheck   # local dev only — never reuse real credentials
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U modcheck"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: modcheck-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata: